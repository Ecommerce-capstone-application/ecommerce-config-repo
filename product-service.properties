server.port=8081

spring.application.name=product-service

# Database
spring.datasource.url=jdbc:sqlserver://sqlserver:1433;databaseName=Product;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=YourStrong@Pass123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true



spring.kafka.consumer.group-id=product-group

server.forward-headers-strategy=framework
springdoc.api-docs.path=/products/v3/api-docs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n
logging.level.root=INFO
