server.port=8081

spring.application.name=product-service

# Database
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Product;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=Test@1234
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

management.endpoints.web.exposure.include=*

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=product-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

server.forward-headers-strategy=framework
springdoc.api-docs.path=/products/v3/api-docs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n
logging.level.root=INFO
