spring.application.name=order-service

server.port=8083

# Database
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Order;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=Test@1234
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

management.endpoints.web.exposure.include=*

# =============================
# CIRCUIT BREAKER
# =============================
resilience4j.circuitbreaker.instances.productService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productService.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.paymentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.paymentService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.paymentService.waitDurationInOpenState=10s


# =============================
# RETRY
# =============================
resilience4j.retry.instances.productService.maxAttempts=3
resilience4j.retry.instances.productService.waitDuration=1s

resilience4j.retry.instances.paymentService.maxAttempts=3
resilience4j.retry.instances.paymentService.waitDuration=1s


# =============================
# TIME LIMITER (VERY IMPORTANT)
# =============================
resilience4j.timelimiter.instances.productService.timeoutDuration=2s
resilience4j.timelimiter.instances.paymentService.timeoutDuration=2s


# =============================
# BULKHEAD (THREAD POOL)
# =============================
resilience4j.thread-pool-bulkhead.instances.productService.coreThreadPoolSize=5
resilience4j.thread-pool-bulkhead.instances.productService.maxThreadPoolSize=10
resilience4j.thread-pool-bulkhead.instances.productService.queueCapacity=20

resilience4j.thread-pool-bulkhead.instances.paymentService.coreThreadPoolSize=5
resilience4j.thread-pool-bulkhead.instances.paymentService.maxThreadPoolSize=10
resilience4j.thread-pool-bulkhead.instances.paymentService.queueCapacity=20


spring.kafka.consumer.group-id=order-group

server.forward-headers-strategy=framework
springdoc.api-docs.path=/orders/v3/api-docs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n
logging.level.root=INFO
